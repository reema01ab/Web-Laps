<!DOCTYPE html>
<html>
<head>
    <title>Students per City</title>
</head>
<body>
    <h2>Number of Students in Each City</h2>

    {% if city_counts %}
        <table border="1" cellpadding="8">
            <tr>
                <th>City</th>
                <th>Number of Students</th>
            </tr>
            {% for item in city_counts %}
            <tr>
                <td>{{ item.address__city }}</td>
                <td>{{ item.student_count }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No student data found.</p>
    {% endif %}
</body>
</html>
